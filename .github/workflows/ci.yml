name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o bin/reliure ./cmd/reliure
          ls -lh bin/reliure
